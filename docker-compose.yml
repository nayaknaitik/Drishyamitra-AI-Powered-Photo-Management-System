services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    expose:
      - "5000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      - backend
      - redis
      - postgres
    command: ["celery", "-A", "app.workers.celery_app.celery_app", "worker", "--loglevel=INFO"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: drishyamitra
      POSTGRES_PASSWORD: drishyamitra
      POSTGRES_DB: drishyamitra
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  frontend_node_modules:

